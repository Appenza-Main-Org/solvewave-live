<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 800px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #02040a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
  }
  /* Grid background */
  .grid {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image: radial-gradient(#10B981 1px, transparent 1px);
    background-size: 30px 30px;
  }
  /* Glow */
  .glow {
    position: absolute;
    top: -20%;
    left: -10%;
    width: 60%;
    height: 60%;
    background: radial-gradient(circle, rgba(16,185,129,0.08), transparent 70%);
    border-radius: 50%;
  }
  .glow2 {
    position: absolute;
    bottom: -20%;
    right: -10%;
    width: 50%;
    height: 50%;
    background: radial-gradient(circle, rgba(6,182,212,0.05), transparent 70%);
    border-radius: 50%;
  }
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
  }
  .logo-container {
    width: 140px;
    height: 140px;
    border-radius: 36px;
    background: linear-gradient(135deg, rgba(16,185,129,0.12), rgba(6,182,212,0.08));
    border: 1.5px solid rgba(16,185,129,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 60px rgba(16,185,129,0.15), 0 0 120px rgba(16,185,129,0.05);
  }
  .title {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 0.06em;
    color: #f0f4f8;
  }
  .title span {
    color: #10B981;
  }
  .tagline {
    font-size: 22px;
    color: rgba(148, 163, 184, 0.8);
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .badges {
    display: flex;
    gap: 16px;
    margin-top: 10px;
  }
  .badge {
    padding: 8px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid rgba(16,185,129,0.2);
    background: rgba(16,185,129,0.08);
    color: #10B981;
  }
  .badge.gemini {
    border-color: rgba(66,133,244,0.3);
    background: rgba(66,133,244,0.08);
    color: #4285F4;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="logo-container">
      <svg width="90" height="90" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sw-wave" x1="6" y1="20" x2="34" y2="20" gradientUnits="userSpaceOnUse">
            <stop stop-color="#06b6d4"/>
            <stop offset="0.5" stop-color="#10B981"/>
            <stop offset="1" stop-color="#06b6d4"/>
          </linearGradient>
          <filter id="sw-glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
        </defs>
        <path d="M8 24C12 24 13 14 20 14C27 14 28 26 32 26" stroke="url(#sw-wave)" stroke-width="3.5" stroke-linecap="round" fill="none" filter="url(#sw-glow)"/>
        <path d="M8 17L10 17L12.5 24" stroke="#06b6d4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
        <circle cx="33" cy="26" r="2.5" fill="#10B981" opacity="0.9"/>
      </svg>
    </div>
    <div class="title">Solve<span>Wave</span></div>
    <div class="tagline">Real-Time AI Math Tutor</div>
    <div class="badges">
      <div class="badge gemini">Gemini Live API</div>
      <div class="badge">Voice-First</div>
      <div class="badge">Interruptible</div>
    </div>
  </div>
</body>
</html>
